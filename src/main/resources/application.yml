server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/[database name]
    username: [database username]
    password: [database password]
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
